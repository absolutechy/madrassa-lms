name: Deploy WordPress Plugin

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via lftp
        run: |
          lftp -c "
            set ftp:ssl-allow false;
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open -u '${{ secrets.FTP_USERNAME }}','${{ secrets.FTP_PASSWORD }}' ftp://${{ secrets.FTP_HOST }};
            mirror --reverse --delete --verbose \
              --exclude='^\.git/' \
              --exclude='^\.github/' \
              --exclude='README\.md' \
              ./ public_html/wp-content/plugins/madrassa-lms/
          "